<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NZM TV Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-4 md:p-8 space-y-6">
    <header>
      <p class="text-sm uppercase tracking-[0.3em] text-cyan-300">NZM TV</p>
      <h1 class="text-3xl md:text-5xl font-bold">Admin Panel</h1>
      <p class="mt-2 text-slate-400">Manage accounts, expiration dates, renewals, and device limits.</p>
    </header><section class="grid gap-4 md:grid-cols-3">
  <div class="rounded-2xl bg-slate-900 p-5 shadow-xl border border-slate-800">
    <p class="text-slate-400">Total Accounts</p>
    <p id="totalAccounts" class="mt-2 text-4xl font-bold">0</p>
  </div>
  <div class="rounded-2xl bg-slate-900 p-5 shadow-xl border border-slate-800">
    <p class="text-slate-400">Active</p>
    <p id="activeAccounts" class="mt-2 text-4xl font-bold text-emerald-300">0</p>
  </div>
  <div class="rounded-2xl bg-slate-900 p-5 shadow-xl border border-slate-800">
    <p class="text-slate-400">Expired</p>
    <p id="expiredAccounts" class="mt-2 text-4xl font-bold text-rose-300">0</p>
  </div>
</section>

<section class="grid gap-6 lg:grid-cols-[420px_1fr]">
  <form id="accountForm" class="rounded-2xl bg-slate-900 border border-slate-800 p-5 shadow-xl space-y-4">
    <div class="flex items-center justify-between">
      <h2 id="formTitle" class="text-xl font-semibold">Create Account</h2>
      <button id="resetBtn" type="button" class="hidden rounded-xl px-3 py-2 bg-slate-800 hover:bg-slate-700 text-sm">New</button>
    </div>

    <label class="block space-y-2">
      <span class="text-sm text-slate-300">Username</span>
      <input id="username" class="w-full rounded-xl bg-slate-950 border border-slate-700 px-4 py-3 outline-none focus:border-cyan-400" placeholder="example: nzmtv001" />
    </label>

    <label class="block space-y-2">
      <span class="text-sm text-slate-300">Password</span>
      <input id="password" class="w-full rounded-xl bg-slate-950 border border-slate-700 px-4 py-3 outline-none focus:border-cyan-400" placeholder="Account password" />
    </label>

    <label class="block space-y-2">
      <span class="text-sm text-slate-300">Expiration / Renew Date</span>
      <input id="expirationDate" type="date" class="w-full rounded-xl bg-slate-950 border border-slate-700 px-4 py-3 outline-none focus:border-cyan-400" />
    </label>

    <label class="block space-y-2">
      <span class="text-sm text-slate-300">Max Devices</span>
      <input id="maxDevices" type="number" min="1" value="1" class="w-full rounded-xl bg-slate-950 border border-slate-700 px-4 py-3 outline-none focus:border-cyan-400" />
    </label>

    <label class="block space-y-2">
      <span class="text-sm text-slate-300">Status</span>
      <select id="status" class="w-full rounded-xl bg-slate-950 border border-slate-700 px-4 py-3 outline-none focus:border-cyan-400">
        <option value="active">Active</option>
        <option value="disabled">Disabled</option>
      </select>
    </label>

    <label class="block space-y-2">
      <span class="text-sm text-slate-300">Notes</span>
      <textarea id="notes" rows="3" class="w-full rounded-xl bg-slate-950 border border-slate-700 px-4 py-3 outline-none focus:border-cyan-400" placeholder="Optional notes"></textarea>
    </label>

    <button id="saveBtn" class="w-full rounded-xl bg-cyan-400 text-slate-950 px-4 py-3 font-semibold hover:bg-cyan-300">
      Create Account
    </button>
  </form>

  <div class="rounded-2xl bg-slate-900 border border-slate-800 p-5 shadow-xl overflow-hidden">
    <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between mb-4">
      <h2 class="text-xl font-semibold">Account Results</h2>
      <input id="search" class="w-full md:w-80 rounded-xl bg-slate-950 border border-slate-700 px-4 py-3 outline-none focus:border-cyan-400" placeholder="Search accounts..." />
    </div>

    <div class="overflow-x-auto">
      <table class="w-full text-left text-sm">
        <thead class="text-slate-400 border-b border-slate-800">
          <tr>
            <th class="py-3 pr-4">Username</th>
            <th class="py-3 pr-4">Expiry</th>
            <th class="py-3 pr-4">Max Devices</th>
            <th class="py-3 pr-4">Status</th>
            <th class="py-3 pr-4">Actions</th>
          </tr>
        </thead>
        <tbody id="accountsTable"></tbody>
      </table>
    </div>
  </div>
</section>

  </div>  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import {
      getDatabase,
      ref,
      push,
      set,
      update,
      remove,
      onValue
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCFUZe8BZKPzU5E_es0Gv5xsqkliB3tTes",
      authDomain: "admin-panel-87530.firebaseapp.com",
      databaseURL: "https://admin-panel-87530-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "admin-panel-87530",
      storageBucket: "admin-panel-87530.firebasestorage.app",
      messagingSenderId: "1065643470010",
      appId: "1:1065643470010:web:ea79e85fef283dfb05a683",
      measurementId: "G-YSCLM1KL0Z"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let accounts = [];
    let editingId = null;

    const accountForm = document.getElementById("accountForm");
    const formTitle = document.getElementById("formTitle");
    const resetBtn = document.getElementById("resetBtn");
    const saveBtn = document.getElementById("saveBtn");
    const searchInput = document.getElementById("search");
    const table = document.getElementById("accountsTable");

    const fields = {
      username: document.getElementById("username"),
      password: document.getElementById("password"),
      expirationDate: document.getElementById("expirationDate"),
      maxDevices: document.getElementById("maxDevices"),
      status: document.getElementById("status"),
      notes: document.getElementById("notes")
    };

    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(value) {
      if (!value) return "No date";
      return new Date(value + "T00:00:00").toLocaleDateString();
    }

    function getStatus(account) {
      if (account.status === "disabled") return "Disabled";
      if (!account.expirationDate) return "No Expiry";

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const expiry = new Date(account.expirationDate + "T00:00:00");

      return expiry < today ? "Expired" : "Active";
    }

    function resetForm() {
      editingId = null;
      fields.username.value = "";
      fields.password.value = "";
      fields.expirationDate.value = "";
      fields.maxDevices.value = 1;
      fields.status.value = "active";
      fields.notes.value = "";
      formTitle.textContent = "Create Account";
      saveBtn.textContent = "Create Account";
      resetBtn.classList.add("hidden");
    }

    function renderStats() {
      document.getElementById("totalAccounts").textContent = accounts.length;
      document.getElementById("activeAccounts").textContent = accounts.filter(a => getStatus(a) === "Active").length;
      document.getElementById("expiredAccounts").textContent = accounts.filter(a => getStatus(a) === "Expired").length;
    }

    function renderTable() {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = accounts.filter(account => {
        const searchable = [account.username, account.expirationDate, account.status, account.notes]
          .filter(Boolean)
          .join(" ")
          .toLowerCase();
        return searchable.includes(query);
      });

      if (filtered.length === 0) {
        table.innerHTML = `<tr><td colspan="5" class="py-10 text-center text-slate-500">No accounts found.</td></tr>`;
        return;
      }

      table.innerHTML = filtered.map(account => {
        const status = getStatus(account);
        const devicesCount = account.devices ? Object.keys(account.devices).length : 0;
        const statusClass = status === "Active"
          ? "bg-emerald-400/10 text-emerald-300"
          : status === "Expired"
            ? "bg-rose-400/10 text-rose-300"
            : "bg-slate-700 text-slate-300";

        return `
          <tr class="border-b border-slate-800/70 hover:bg-slate-800/30">
            <td class="py-4 pr-4 font-medium">
              <div>${escapeHtml(account.username)}</div>
              ${account.notes ? `<div class="text-xs text-slate-500 mt-1">${escapeHtml(account.notes)}</div>` : ""}
            </td>
            <td class="py-4 pr-4">${formatDate(account.expirationDate)}</td>
            <td class="py-4 pr-4">${devicesCount}/${account.maxDevices || 1}</td>
            <td class="py-4 pr-4">
              <span class="rounded-full px-3 py-1 text-xs font-semibold ${statusClass}">${status}</span>
            </td>
            <td class="py-4 pr-4">
              <div class="flex flex-wrap gap-2">
                <button data-action="edit" data-id="${account.id}" class="rounded-lg bg-slate-800 px-3 py-2 hover:bg-slate-700">Edit</button>
                <button data-action="renew" data-id="${account.id}" class="rounded-lg bg-emerald-500/20 text-emerald-200 px-3 py-2 hover:bg-emerald-500/30">+30d</button>
                <button data-action="clear" data-id="${account.id}" class="rounded-lg bg-amber-500/20 text-amber-200 px-3 py-2 hover:bg-amber-500/30">Clear Devices</button>
                <button data-action="delete" data-id="${account.id}" class="rounded-lg bg-rose-500/20 text-rose-200 px-3 py-2 hover:bg-rose-500/30">Delete</button>
              </div>
            </td>
          </tr>
        `;
      }).join("");
    }

    function render() {
      renderStats();
      renderTable();
    }

    onValue(ref(db, "accounts"), snapshot => {
      const data = snapshot.val() || {};
      accounts = Object.entries(data)
        .map(([id, value]) => ({ id, ...value }))
        .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      render();
    });

    accountForm.addEventListener("submit", async event => {
      event.preventDefault();

      const username = fields.username.value.trim();
      const password = fields.password.value.trim();

      if (!username) {
        alert("Username is required.");
        return;
      }

      if (!editingId && !password) {
        alert("Password is required for a new account.");
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = "Saving...";

      const payload = {
        username,
        password,
        expirationDate: fields.expirationDate.value,
        maxDevices: Number(fields.maxDevices.value) || 1,
        status: fields.status.value,
        notes: fields.notes.value.trim(),
        updatedAt: Date.now()
      };

      try {
        if (editingId) {
          await update(ref(db, `accounts/${editingId}`), payload);
        } else {
          const newAccountRef = push(ref(db, "accounts"));
          await set(newAccountRef, {
            ...payload,
            devices: {},
            createdAt: Date.now()
          });
        }

        resetForm();
      } catch (error) {
        console.error(error);
        alert("Failed to save account. Check Firebase Realtime Database rules.");
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = editingId ? "Save Changes" : "Create Account";
      }
    });

    table.addEventListener("click", async event => {
      const button = event.target.closest("button");
      if (!button) return;

      const id = button.dataset.id;
      const action = button.dataset.action;
      const account = accounts.find(a => a.id === id);
      if (!account) return;

      if (action === "edit") {
        editingId = id;
        fields.username.value = account.username || "";
        fields.password.value = account.password || "";
        fields.expirationDate.value = account.expirationDate || "";
        fields.maxDevices.value = account.maxDevices || 1;
        fields.status.value = account.status || "active";
        fields.notes.value = account.notes || "";
        formTitle.textContent = "Edit Account";
        saveBtn.textContent = "Save Changes";
        resetBtn.classList.remove("hidden");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      if (action === "renew") {
        const base = account.expirationDate ? new Date(account.expirationDate + "T00:00:00") : new Date();
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const start = base < today ? today : base;
        start.setDate(start.getDate() + 30);
        const newDate = start.toISOString().slice(0, 10);

        await update(ref(db, `accounts/${id}`), {
          expirationDate: newDate,
          status: "active",
          updatedAt: Date.now()
        });
      }

      if (action === "clear") {
        if (confirm(`Remove all registered devices for "${account.username}"?`)) {
          await set(ref(db, `accounts/${id}/devices`), {});
        }
      }

      if (action === "delete") {
        if (confirm(`Delete account "${account.username}"? This cannot be undone.`)) {
          await remove(ref(db, `accounts/${id}`));
        }
      }
    });

    searchInput.addEventListener("input", renderTable);
    resetBtn.addEventListener("click", resetForm);
  </script></body>
  </html>
